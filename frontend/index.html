<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Invincible: Guarding the Globe — Demo</title>
  </head>
  <body>
    <h1>Invincible: Guarding the Globe — Demo Frontend</h1>
    <section>
      <h2>Auth</h2>
      <div>
        <input id="username" placeholder="username" />
        <input id="password" placeholder="password" type="password" />
        <button id="register">Register</button>
        <button id="login">Login</button>
        <button id="logout">Logout</button>
      </div>
      <div id="auth-status">Not logged in</div>
    </section>

    <section>
      <h2>Players</h2>
      <p>Click to load players from the Worker API.</p>
      <button id="load">Load players</button>
      <ul id="players"></ul>
    </section>

    <script type="module" src="./main.js"></script>
  </body>
</html>
